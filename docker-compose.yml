name: tcc

services:
  postgres:
    image: postgres:16
    container_name: tcc-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tcc
    ports:
      - "5433:5432"
    volumes:
      - tcc_pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build: .
    container_name: tcc-api
    command: node --watch server/server.js
    env_file:
      - .env
    environment:
      # sobrescreve o DATABASE_URL do .env (host) pelo endereço interno do compose
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/tcc
      PORT: 4000
    ports:
      - "4000:4000"
    volumes:
      - ./server:/app/server
    depends_on:
      - postgres
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.8
    container_name: tcc-loki
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./ops/loki/config.yml:/etc/loki/config.yml:ro
      - tcc_loki_data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.8
    container_name: tcc-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./ops/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: tcc-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3001:3000"
    volumes:
      - tcc_grafana_data:/var/lib/grafana
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  tcc_pg_data:
  tcc_loki_data:
  tcc_grafana_data: