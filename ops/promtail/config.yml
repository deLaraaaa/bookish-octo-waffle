server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        target_label: container
      - source_labels: ['__meta_docker_container_image']
        target_label: image

    pipeline_stages:
      - docker: {}
      # Se seus logs forem JSON (recomendado), o promtail extrai campos
      - json:
          expressions:
            level: level
            message: message
            ts: ts
            request_id: request_id
            path: path
            method: method
            status: status
            duration_ms: duration_ms
      - labels:
          level: